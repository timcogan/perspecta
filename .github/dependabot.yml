version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 2
    assignees:
      - timcogan
    commit-message:
      prefix: chore
      include: scope
    # Keep Dependabot from reintroducing the egui/eframe 0.34.x regression
    # until the freeze is understood and fixed.
    ignore:
      - dependency-name: eframe
        versions:
          - "0.34.x"
      - dependency-name: egui
        versions:
          - "0.34.x"
    groups:
      cargo-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 2
    assignees:
      - timcogan
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: rust-toolchain
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 2
    assignees:
      - timcogan
    commit-message:
      prefix: chore
      include: scope
