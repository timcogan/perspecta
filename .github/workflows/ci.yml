name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Version Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release version format
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(
            awk '
              /^\s*\[package\]\s*$/ { in_package = 1; next }
              /^\s*\[/ { in_package = 0 }
              in_package && /^\s*version\s*=\s*/ { print $3; exit }
            ' Cargo.toml | tr -d '"'
          )"

          [[ -n "$current_version" ]] || {
            echo "failed to determine package version from Cargo.toml" >&2
            exit 1
          }

          [[ "$current_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "release automation only supports Cargo.toml versions in X.Y.Z format, found: $current_version" >&2
            exit 1
          }

  rust:
    name: Rust Checks
    needs: [version]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve Rust toolchain
        id: rust-toolchain
        shell: bash
        run: |
          set -euo pipefail

          toolchain="$(
            awk -F '"' '/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"/ { print $2; exit }' rust-toolchain.toml
          )"

          [[ -n "$toolchain" ]] || {
            echo "failed to determine Rust toolchain from rust-toolchain.toml" >&2
            exit 1
          }

          echo "toolchain=$toolchain" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust-toolchain.outputs.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-targets --all-features --locked

  gitleaks:
    name: Secret Scan
    needs: [version]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          sudo apt-get update
          sudo apt-get install -y gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact
